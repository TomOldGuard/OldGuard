<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<title>Old Guard / PLaiGROUND — a digital sandbox</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" type="image/png" href="assets/logo.png">
<link rel="apple-touch-icon" href="assets/logo.png">
<meta name="description" content="A digital sandbox at the intersection of AI and design. Experiments, demos, and studies.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css">
</head>
<body>

<header class="site-header" data-header></header>

<section class="intro" data-screen-label="00 Index" style="font-size: 42px">
  <h1>
    PL<span class="accent">ai</span>GROUND<span class="lower">A digital sandbox.</span>
  </h1>
</section>

<nav class="toolbar" aria-label="Index">
  <div class="toolbar-count" data-toolbar-count></div>
</nav>

<main class="experiments" data-view="list" data-experiments></main>

<footer class="site-footer" data-footer></footer>

<script src="assets/experiments.js"></script>
<script src="assets/thumbs.js"></script>
<script src="assets/chrome.js"></script>
<script>
  // Render shared chrome
  OG.renderHeader();
  OG.renderFooter();

  // ---- EXPERIMENT CARDS -------------------------------------------
  const mount = document.querySelector("[data-experiments]");
  mount.innerHTML = EXPERIMENTS.map(e => `
    <a class="card" href="${e.href}">
      <div class="thumb stripes" data-thumb="${e.slug}">
        <div class="thumb-canvas" data-thumb-mount="${e.slug}"></div>
        <span class="thumb-arrow">↗</span>
        <span class="thumb-label">${e.num}</span>
      </div>
      <div class="card-meta">
        <span class="meta-num">${e.num}</span>
        <span class="meta-title">${e.title}</span>
        <span class="meta-arrow">→</span>
      </div>
    </a>
  `).join('');

  document.querySelector("[data-toolbar-count]").textContent =
    `${String(EXPERIMENTS.length).padStart(3,'0')} EXPERIMENTS`;

  // Render thumbnail mini-previews
  EXPERIMENTS.forEach(e => {
    const m = document.querySelector(`[data-thumb-mount="${e.slug}"]`);
    if (m && window.THUMBS && THUMBS[e.slug]) THUMBS[e.slug](m);
  });
</script>

</body>
</html>
